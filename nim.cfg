-d:"useMalloc"

--nimcache:nimcache

@if release or danger:
  checks:off
  panics:on
  -d:lto
  --passC:"-march=native -fhardened"
@elif debug:
  --verbosity:3
  --opt:"none"
  --debugger:"native"

  @if windows:
    --passC:"-fno-omit-frame-pointer"
  @else:
    --passC:"-fsanitize=address,undefined -fno-omit-frame-pointer"
    --passL:"-fsanitize=address,undefined"
  @end
@else:
  --verbosity:2

  @if windows:
    --passC:"-fno-omit-frame-pointer"
  @else:
    --passC:"-fsanitize=address,undefined -fno-omit-frame-pointer"
    --passL:"-fsanitize=address,undefined"
  @end
@end
